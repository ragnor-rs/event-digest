# Custom GPT prompt for event detection (optional)
# Identifies which messages are single event announcements
#
# PLACEHOLDER:
#   {{MESSAGES}} - numbered list: "1. text\n\n2. text"
#
# REQUIRED OUTPUT:
#   Format: "MESSAGE_NUMBER:CONFIDENCE" (one per line)
#   Confidence: 0.0-1.0 (how certain it's an event)
#   Example: "1:0.95" or "none"
#
# EXAMPLE PROMPT:
# eventDetectionPrompt: |
#   Identify messages announcing a SINGLE SPECIFIC EVENT with date/time.
#   Include: workshops, meetups, presentations, talks with timing info
#   Exclude: event digests, general announcements, job postings
#   {{MESSAGES}}
#   Format: MESSAGE_NUMBER:CONFIDENCE (0.0-1.0)
#   Example: 1:0.95
#   If none: "none"

# Custom GPT prompt for interest matching (optional)
# Matches events to user interests with confidence scores
#
# PLACEHOLDERS:
#   {{EVENTS}} - numbered list: "0: event text\n1: event text"
#   {{INTERESTS}} - numbered list: "0: interest name\n1: interest name"
#
# REQUIRED OUTPUT:
#   Interest matches with confidence: "INTEREST_INDEX:CONFIDENCE, INTEREST_INDEX:CONFIDENCE"
#   Example: "19:0.95, 6:0.85" or "none"
#
# EXAMPLE PROMPT:
# interestMatchingPrompt: |
#   Match events to interests with confidence scores (0.0-1.0).
#
#   HIERARCHICAL MATCHING: Interests may contain parent categories with examples in parentheses.
#   Match if event relates to the category OR any specific example.
#
#   STRICT RELEVANCE:
#   - "Professional networking" ≠ "Social gatherings" (professional ≠ casual)
#   - "Frontend/React" ≠ "Backend/database" (different tech stacks)
#   - "Music concerts" ≠ "Music production workshops" (consumption ≠ creation)
#
#   EVENTS:
#   {{EVENTS}}
#   INTERESTS:
#   {{INTERESTS}}
#
#   Format: INDEX:CONFIDENCE, INDEX:CONFIDENCE
#   Example: 19:0.95, 6:0.72
#   If no matches: none

# Custom GPT prompt for event type classification (optional)
# Classifies events as offline (0), online (1), or hybrid (2)
#
# PLACEHOLDER:
#   {{MESSAGES}} - numbered list: "1. text\n\n2. text"
#
# REQUIRED OUTPUT:
#   Format: "MESSAGE_NUMBER:INDEX:CONFIDENCE" (one per line)
#   INDEX: 0=offline, 1=online, 2=hybrid
#   CONFIDENCE: 0.0-1.0 (how certain about classification)
#   Example: "1:0:0.95" or "2:1:0.85"
#
# EXAMPLE PROMPT:
# eventTypeClassificationPrompt: |
#   Classify events: 0=offline (physical location), 1=online (virtual only), 2=hybrid (both).
#   OFFLINE: physical addresses, venues, map links
#   ONLINE: only virtual links, no physical location
#   HYBRID: both physical and online options mentioned
#   {{MESSAGES}}
#   Format: MESSAGE_NUMBER:INDEX:CONFIDENCE
#   Example: 1:0:0.95

# Custom GPT prompt for schedule/datetime extraction (optional)
# Extracts event start date and time from messages
#
# PLACEHOLDERS:
#   {{TODAY_DATE}} - current date (e.g., "Mon Oct 07 2025")
#   {{MESSAGES}} - numbered list with timestamps: "1. [Posted: date] text"
#
# REQUIRED OUTPUT:
#   Format: "MESSAGE_NUMBER: DD Mon YYYY HH:MM" (one per line)
#   Use 3-letter month abbreviations (Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec)
#   Use 24-hour time format with leading zeros
#   Example: "1: 05 Dec 2024 19:30"
#   If unknown: "MESSAGE_NUMBER: unknown"
#
# EXAMPLE PROMPT:
# scheduleExtractionPrompt: |
#   Extract start datetime for each event. Today is {{TODAY_DATE}}.
#   Use message timestamps to infer correct year.
#   {{MESSAGES}}
#   EXACT format: MESSAGE_NUMBER: DD Mon YYYY HH:MM
#   Examples: 1: 05 Dec 2024 19:30
#   NEVER return just time like "19:30" - always include full date

# Custom GPT prompt for event description generation (optional)
# Converts event messages into structured titles and summaries
#
# PLACEHOLDER:
#   {{EVENTS}} - numbered list with metadata: "1. Start time: ... Interests: ... Content: ... Link: ..."
#
# REQUIRED OUTPUT:
#   EXACT format per event (must include keywords TITLE:, SUMMARY:, DESCRIPTION:):
#   "MESSAGE_NUMBER:
#   TITLE: [short catchy title in English]
#   SUMMARY: [1-2 sentence summary in English - no dates/times]
#   DESCRIPTION: [full description, can be original language]"
#
# EXAMPLE PROMPT:
# eventDescriptionPrompt: |
#   Convert events to English titles and summaries. Respond in English.
#   {{EVENTS}}
#   EXACT format (include keywords TITLE:, SUMMARY:, DESCRIPTION:):
#   MESSAGE_NUMBER:
#   TITLE: [short catchy title in English]
#   SUMMARY: [1-2 sentences, DO NOT mention dates/times]
#   DESCRIPTION: [full description from message, can be original language]
